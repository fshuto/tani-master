<div class="feedback" id="feedback" aria-live="polite" hidden>
  <div class="feedback__circle feedback__circle--correct" id="feedback-correct">
    <span class="feedback__mark">⭕</span>
    <p class="feedback__text">すごい！ せいかい！</p>
    <p class="feedback__explanation" id="feedback-explanation"></p>
  </div>
  <div class="feedback__circle feedback__circle--incorrect" id="feedback-incorrect">
    <span class="feedback__mark">❌</span>
    <p class="feedback__text">もういちど チャレンジ！</p>
    <p class="feedback__explanation" id="feedback-explanation-wrong"></p>
  </div>
  <button class="btn btn--next" id="btn-next">つぎへ →</button>
</div>
